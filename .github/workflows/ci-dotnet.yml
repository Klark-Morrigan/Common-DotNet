name: CI (.NET)

# Reusable .NET CI workflow for SynergyOps repositories.
#
# This YAML orchestrates the job. Each step delegates to a dedicated
# composite action under `.github/actions/`, so per-step logic stays
# testable in isolation and the workflow stays readable. Composite
# actions colocate their PowerShell script next to action.yml and
# invoke it via ${{ github.action_path }}, which means the action body
# and its script ship together at the same SHA.
#
# Consumers invoke this workflow via `uses:` pinned to a commit SHA.
#
# Why two checkouts:
#   The first checkout is the consumer's code (the thing we restore,
#   build, test, and measure). The second is a *separate* checkout of
#   DotNet-Common itself into `.dotnet-common/`, used only as the
#   source of the composite actions this workflow references via
#   `uses: ./.dotnet-common/.github/actions/<name>`. The alternative
#   - if-guarded pairs of `./` and `<repo>@master` step references -
#   forces GitHub Actions to resolve the `@master` ref at job start
#   even when the if-guard would skip the step, so a stale master
#   (or a PR-branch action that does not yet exist on master) breaks
#   the job before any step runs. Two-checkout side-steps the
#   eager-resolution footgun entirely.
#
#   The second checkout's `ref` is `github.workflow_sha` - the commit
#   SHA of the called workflow file. For a consumer that pinned
#   `uses: ...ci-dotnet.yml@<sha>`, this resolves to <sha>, so the
#   composite actions are taken from exactly the version the consumer
#   asked for - no master-following leak across a SHA-pinned boundary.
#   For self-test, where the workflow is called via a repo-relative
#   `uses: ./.github/workflows/ci-dotnet.yml`, `github.workflow_sha`
#   equals `github.sha` (same repo, same commit), so the PR's version
#   of the actions is what gets tested.

on:
  workflow_call:
    inputs:
      solution-path:
        description: >-
          Path to the .sln (or .slnx) file to restore and build,
          relative to the consumer repo root.
        required: true
        type: string
      runs-on-label:
        description: >-
          Extra runner label combined with `self-hosted` to target a
          specific runner pool. Defaults to `self-hosted` which makes
          the effective selector `[self-hosted, self-hosted]` (a no-op
          second label) so any self-hosted runner is eligible.
        required: false
        type: string
        default: self-hosted
      coverage-threshold:
        description: >-
          Minimum acceptable line coverage as a percentage (0-100).
          The job fails if the merged Cobertura report's line-rate
          falls below this value. Default 90 mirrors the SynergyOps
          house standard; raise or lower per-consumer when justified.
        required: false
        type: number
        default: 90

jobs:
  build:
    name: Restore and build
    runs-on: [self-hosted, "${{ inputs.runs-on-label }}"]
    steps:
      # Consumer code: the thing we restore / build / test / measure.
      - name: Checkout consumer
        uses: actions/checkout@v5

      # DotNet-Common action source: the composite actions every
      # later step references via `./.dotnet-common/...`. See header
      # comment for why this is a separate checkout instead of
      # if-guarded `./` vs `@master` step pairs.
      - name: Checkout DotNet-Common (action source)
        uses: actions/checkout@v5
        with:
          repository: VitaliiAndreev/DotNet-Common
          ref: ${{ github.workflow_sha }}
          path: .dotnet-common

      - name: Clean workspace artifacts
        uses: ./.dotnet-common/.github/actions/clear-workspace-artifacts

      - name: Assert .NET SDK
        uses: ./.dotnet-common/.github/actions/assert-dotnet-sdk

      # Grouped with the SDK assertion so every required tool is
      # checked before any long-running step.
      - name: Assert ReportGenerator
        uses: ./.dotnet-common/.github/actions/assert-reportgenerator

      - name: Restore
        uses: ./.dotnet-common/.github/actions/dotnet-restore
        with:
          solution-path: ${{ inputs.solution-path }}

      - name: Build
        uses: ./.dotnet-common/.github/actions/dotnet-build
        with:
          solution-path: ${{ inputs.solution-path }}

      - name: Test
        uses: ./.dotnet-common/.github/actions/dotnet-test
        with:
          solution-path: ${{ inputs.solution-path }}

      # Turns the raw Cobertura output from `dotnet-test` into a
      # browsable HTML report plus a text summary and merged
      # Cobertura. The merged Cobertura is the canonical input the
      # threshold gate reads.
      - name: Coverage report
        uses: ./.dotnet-common/.github/actions/dotnet-coverage-report

      # Reads the merged Cobertura emitted by `dotnet-coverage-report`
      # and fails the job when line coverage drops below the
      # configured threshold. Placed before the artifact upload so
      # the gate is the final word on the build, but the upload step
      # uses `if: always()` so reviewers still get the report when
      # the gate fails - that is exactly when they need it most.
      - name: Coverage threshold gate
        uses: ./.dotnet-common/.github/actions/assert-coverage-threshold
        with:
          coverage-threshold: ${{ inputs.coverage-threshold }}

      # Single artifact carrying HTML, Summary.txt, and the merged
      # Cobertura. Uploaded unconditionally on job completion (even
      # on test failure) so reviewers can still inspect partial
      # coverage for the assemblies whose tests did run.
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: CoverageReport/
          if-no-files-found: error
