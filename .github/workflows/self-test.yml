name: Self-test (ci-dotnet)

# Self-test for the reusable `ci-dotnet.yml` workflow.
#
# Why this exists: `ci-dotnet.yml` is the contract every SynergyOps
# .NET repo depends on. Without an in-repo check that exercises it
# end-to-end on every change, regressions in the reusable workflow
# (or in any of its composite actions) land unnoticed and surface
# only when a downstream consumer's CI breaks. This workflow runs
# `ci-dotnet.yml` against the in-repo self-test sample under
# `tests/sample/` so the contract is validated on every push and
# pull request to this repo.
#
# Branch protection: configure the GitHub repo settings to require
# the `Self-test (ci-dotnet) / Restore and build` check on PRs to
# `master`. The branch-protection setup is manual and is not encoded
# here (see README.md - "Branch protection").

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  self-test:
    # Invoke the local copy of the reusable workflow. The `uses:`
    # path is repo-relative (no `@ref`) which pins the called
    # workflow to the same commit as this caller - exactly what a
    # self-test needs, since the whole point is to validate the
    # version of `ci-dotnet.yml` that ships with this commit.
    uses: ./.github/workflows/ci-dotnet.yml
    with:
      solution-path: tests/sample/Sample.sln
