name: Assert ReportGenerator is present
description: >
  Preflight that fails fast with an actionable message if the
  ReportGenerator global tool is not on PATH. Without this, a missing
  tool surfaces as a confusing "command not found" several steps later
  inside the coverage-report step. On self-hosted, ReportGenerator is
  expected to be baked into the runner image (as a global `dotnet
  tool`); the error message points at the runner image so the fix lands
  there, not ad hoc on the runner host.

runs:
  using: composite
  steps:
    - name: Assert ReportGenerator
      shell: pwsh
      run: |
        & "${{ github.action_path }}/Assert-ReportGenerator.ps1"
