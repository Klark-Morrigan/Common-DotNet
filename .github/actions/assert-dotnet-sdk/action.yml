name: Assert .NET SDK is present
description: >
  Preflight that fails fast with an actionable message if the .NET SDK
  is not on PATH. Without this, a missing SDK surfaces as a confusing
  `dotnet restore` error several steps later. On self-hosted the SDK is
  expected to be baked into the runner image; the error message points
  at the runner image so the fix lands there, not ad hoc on the host.

runs:
  using: composite
  steps:
    - name: Assert .NET SDK
      shell: pwsh
      run: |
        & "${{ github.action_path }}/Assert-DotnetSdk.ps1"
